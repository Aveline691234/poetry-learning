<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI古诗学习系统 - 选择入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #8B7355;
            --gold: #C9A96E;
            --gold-light: #D4B87A;
            --stone: #F9F6F1;
            --stone-dark: #EBE5DB;
            --text-dark: #4A3F35;
            --text-medium: #6B5545;
            --text-light: #9B8365;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #FDFCFA 0%, #F9F6F1 50%, #F5EFE7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .entry-card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 8px 32px rgba(139,115,85,0.15);
            max-width: 900px;
            width: 90%;
        }
        .entry-card:hover {
            box-shadow: 0 12px 40px rgba(139,115,85,0.2);
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 16px;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 40px;
        }
        .entry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }
        @media (max-width: 640px) {
            .entry-grid { grid-template-columns: 1fr; }
        }
        .entry-box {
            border: 3px solid var(--stone-dark);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(145deg, #FFFDF8 0%, #FDFCF7 100%);
        }
        .entry-box:hover {
            border-color: var(--gold);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(201,169,110,0.2);
        }
        .entry-box.student:hover {
            border-color: #3B82F6;
            box-shadow: 0 8px 24px rgba(59,130,246,0.2);
        }
        .entry-box.teacher:hover {
            border-color: #8B5CF6;
            box-shadow: 0 8px 24px rgba(139,92,246,0.2);
        }
        .entry-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .entry-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .entry-desc {
            font-size: 14px;
            color: var(--text-light);
            line-height: 1.6;
        }
        .poem-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        .poem-char {
            position: absolute;
            font-size: 120px;
            color: var(--stone-dark);
            opacity: 0.3;
            font-family: 'Ma Shan Zheng', cursive;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="poem-bg">
        <span class="poem-char" style="top: 10%; left: 5%;">泊</span>
        <span class="poem-char" style="top: 60%; right: 5%;">船</span>
        <span class="poem-char" style="bottom: 10%; left: 15%;">瓜</span>
        <span class="poem-char" style="top: 30%; right: 15%;">洲</span>
    </div>

    <div class="entry-card">
        <h1 class="title">AI古诗学习系统</h1>
        <p class="subtitle">《泊船瓜洲》- 王安石</p>

        <div class="entry-grid">
            <div class="entry-box student" onclick="enterStudent()">
                <div class="entry-icon">🎓</div>
                <div class="entry-title">学生入口</div>
                <div class="entry-desc">
                    输入姓名和学号<br>
                    开始诗词学习之旅
                </div>
            </div>

            <div class="entry-box teacher" onclick="enterTeacher()">
                <div class="entry-icon">👨‍🏫</div>
                <div class="entry-title">教师入口</div>
                <div class="entry-desc">
                    查看学生学习进度<br>
                    管理与数据分析
                </div>
            </div>
        </div>
    </div>

    <div id="studentModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity">
        <div class="bg-white rounded-2xl p-8 max-w-md mx-4 w-full shadow-2xl">
            <h3 class="text-2xl font-bold text-[var(--text-dark)] mb-6 text-center">🎓 学生登录</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[var(--text-medium)] mb-2 font-medium">姓名</label>
                    <input type="text" id="studentName" class="w-full border-2 border-[var(--stone-dark)] rounded-xl px-4 py-3 text-lg focus:border-[var(--gold)] focus:outline-none" placeholder="请输入姓名">
                </div>
                <div>
                    <label class="block text-[var(--text-medium)] mb-2 font-medium">学号</label>
                    <input type="text" id="studentId" class="w-full border-2 border-[var(--stone-dark)] rounded-xl px-4 py-3 text-lg focus:border-[var(--gold)] focus:outline-none" placeholder="请输入学号">
                </div>
            </div>
            <div class="flex gap-4 mt-6">
                <button onclick="closeStudentModal()" class="flex-1 bg-[var(--stone)] text-[var(--text-medium)] py-3 rounded-xl font-medium hover:bg-[var(--stone-dark)] transition-colors">取消</button>
                <button onclick="loginStudent()" class="flex-1 bg-gradient-to-r from-blue-500 to-blue-600 text-white py-3 rounded-xl font-medium hover:from-blue-600 hover:to-blue-700 transition-colors">进入学习</button>
            </div>
        </div>
    </div>

    <script>
        function enterStudent() {
            document.getElementById('studentModal').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('studentName').focus();
        }

        function closeStudentModal() {
            document.getElementById('studentModal').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('studentName').value = '';
            document.getElementById('studentId').value = '';
        }

        function loginStudent() {
            const name = document.getElementById('studentName').value.trim();
            const id = document.getElementById('studentId').value.trim();

            if (!name) {
                alert('请输入姓名');
                document.getElementById('studentName').focus();
                return;
            }
            if (!id) {
                alert('请输入学号');
                document.getElementById('studentId').focus();
                return;
            }

            localStorage.setItem('currentStudent', id);
            localStorage.setItem('currentStudentName', name);
            closeStudentModal();
            window.location.href = 'index.html';
        }

        function enterTeacher() {
            window.location.href = 'teacher.html';
        }

        document.getElementById('studentId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginStudent();
        });
        document.getElementById('studentName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('studentId').focus();
        });
    </script>
</body>
</html>
